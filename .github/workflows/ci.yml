name: Robot Framework
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: robot --pythonpath resources --outputdir results tests
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-results
          path: results/
          retention-days: 7
